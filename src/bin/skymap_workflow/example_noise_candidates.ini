[workflow]
dag_filename = noise_skymaps.dag
retries = 1

[condor]
cluster = resceubbc
universe = vanilla
accounting_group = ligo.dev.o5.cbc.uber.gstlaloffline
accounting_group_user = alvin.li
request_cpus = 1
request_memory = 4GB
request_disk = 4GB
container_mode = auto
container_image = /data/alvin.li/debian-trixie-gstlal-260630.sif
container_bind_paths = /data:/data,/home:/home
extra_environment =

[gstlal]
run_dir = /data/alvin.li/Projects/gstlal_developments/gstlal_tests/test_3
database_type = noise
noise_database = /data/alvin.li/Projects/gstlal_developments/gstlal_tests/test_3/H1L1V1-ALL_LLOID-1243161494-625396.sqlite
frame_cache =

[manifest]
order_by = far
order = desc
limit = 100
instruments = H1,L1,V1
zero_lag_only = true
exclude_time_windows = center:1243533585:300
far_lt =
far_gt = 3e-7
snr_gt =
gps_pad = 70
snr_pad = 1
pre_trigger = 0.12

[data]
data_source = frames
segments_name = datasegments
psd_fft_length = 32

[calc_snr]
fir_stride = 1
ht_gate_threshold =

[skymap]
backend = coherent_likelihood
write_coefficients = true
precalc_dir = /data/alvin.li/Projects/gstlal_developments/gstlal_tests/test_1/lower_snr_injection_test/workflow_runs/example_psd/dag_precompute/outputs/precalc/H1L1V1_asd_438
mode = asd
precalc_len = 438
sample_rate = 2048
effective_sample_rate = 512
pre_trigger = 0.12
direct_nside = 32
adaptive = false
adaptive_nside_stop = 256
adaptive_refine_top_pixels = 128
adaptive_refine_probability = 0.0
adaptive_refine_neighbors = false
adaptive_max_evals = 20000
direct_coeff_lmax = 95
direct_coeff_log_floor = 50
direct_score_scale = -1
isotropic_mixture = 0.0
antenna_mixture = 0.0
direct_smoothing_deg = 0.0
containment_calibration = false
low_snr_threshold = 8.0
low_snr_score_scale = 1e-4
low_snr_smoothing_deg = 8.0
low_snr_isotropic_mixture = 0.0
low_snr_antenna_mixture = 0.1
high_snr_threshold = 50.0
high_snr_score_scale = 2e-4
high_snr_smoothing_deg = 0.0
high_snr_isotropic_mixture = 0.0
high_snr_antenna_mixture = 0.0
time_prior_center = center_time
time_prior_half_width = 0.008
paper_fmin = 0.0
paper_fmax = 512.0
paper_autocorr_floor = 1e-6
amplitude_model = paper_cross
peak_time_sigma = 0.0
peak_time_min_snr = 0.0
peak_time_min_peak_abs = 8.0
peak_time_min_prominence = 0.0
inclination_samples = 5
polarization_samples = 4
contour = 50 90
