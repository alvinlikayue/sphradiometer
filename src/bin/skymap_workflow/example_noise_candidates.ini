[workflow]
dag_filename = noise_skymaps.dag
retries = 1

[condor]
cluster = resceubbc
universe = vanilla
accounting_group = ligo.dev.o5.cbc.uber.gstlaloffline
accounting_group_user = alvin.li
request_cpus = 1
request_memory = 4GB
request_disk = 4GB
container_mode = auto
container_image = /data/alvin.li/debian-trixie-gstlal-260630.sif
container_bind_paths = /data:/data,/home:/home
extra_environment =

[gstlal]
run_dir = /data/alvin.li/Projects/gstlal_developments/gstlal_tests/test_3
database_type = noise
noise_database = /data/alvin.li/Projects/gstlal_developments/gstlal_tests/test_3/H1L1V1-ALL_LLOID-1243161494-625396.sqlite
frame_cache =

[manifest]
order_by = far
order = asc
limit = 100
instruments = H1,L1,V1
exclude_time_windows = center:1243533585:300
far_lt =
far_gt = 3e-7
snr_gt =
gps_pad = 70
snr_pad = 1
pre_trigger = 0.12

[data]
data_source = frames
segments_name = datasegments
psd_fft_length = 32

[calc_snr]
fir_stride = 1
ht_gate_threshold =

[skymap]
precalc_dir = /data/alvin.li/Projects/gstlal_developments/gstlal_tests/test_1/lower_snr_injection_test/workflow_runs/example_psd/dag_precompute/outputs/precalc/H1L1V1_asd_438
mode = asd
precalc_len = 438
sample_rate = 2048
effective_sample_rate = 512
pre_trigger = 0.12
contour = 50 90
