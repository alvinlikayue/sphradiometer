[workflow]
dag_filename = injection_skymaps.dag
retries = 1
output_root = outputs

[condor]
universe = vanilla
request_cpus = 1
request_memory = 4GB
request_disk = 4GB
container_mode = none

[manifest]
path = example_manifest.csv

[skymap]
precalc_dir = outputs/precalc/H1L1V1_asd_438/H1L1V1
psd_xml =
mode = asd
precalc_len = 438
sample_rate = 2048
effective_sample_rate = 512
pre_trigger = 0.12
write_coefficients = true
write_branch_maps = false
include_whitening = false
no_derotate = false
timing = false
