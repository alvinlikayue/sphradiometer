[workflow]
dag_filename = precompute_skymap.dag
retries = 1

[condor]
universe = vanilla
request_cpus = 2
request_memory = 6GB
request_disk = 4GB
container_mode = none

[precompute]
psd_xml = /path/to/H1L1V1-REFERENCE_PSD-START-DUR.xml.gz
instruments = H1,L1,V1
combinations = all
mode = asd
precalc_len = 438
delta_t = 0.00048828125
sample_rate = 2048
effective_sample_rate = 512
apply_projection = true
force = true
